# Construye la app en ./wedding y publica en GitHub Pages.
# Activa en el repo: Settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Sin esto, los secretos/variables solo del entorno «github-pages» no existen en este job:
    # solo el job `deploy` los veía, y `npm run build` recibía VITE_* vacías.
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: wedding/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: wedding

      - name: Build
        run: npm run build
        working-directory: wedding
        env:
          # Dominio personalizado: base en raíz (/). Para probar en https://<usuario>.github.io/<repo>/,
          # crea variable de Actions VITE_BASE (p. ej. /KatheAndresWedding/) en Settings → Secrets and variables → Actions → Variables.
          VITE_BASE: ${{ vars.VITE_BASE || '/' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: wedding/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
